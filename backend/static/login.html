<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="StockNet — Login or create your simulated trading account.">
  <title>StockNet — Login</title>
  <link rel="stylesheet" href="/static/app.css?v=2">
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">📈</div>
      <div>
        <div style="font-family:var(--font-heading);font-weight:800;font-size:1.2rem;color:var(--green);">STOCKNET</div>
        <div style="font-size:0.72rem;color:var(--text-muted);margin-top:1px;">Simulated Trading Platform</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <form id="form-login" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="login-email">Email</label>
        <input type="email" id="login-email" class="form-control" placeholder="demo@stocknet.io" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <input type="password" id="login-password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
      </div>

      <div id="login-error" class="alert-banner alert-banner-warning" style="margin-bottom:16px;">
        <div class="alert-desc" id="login-error-msg"></div>
      </div>

      <button type="submit" id="btn-login" class="btn-primary">Sign In</button>

      <p style="text-align:center;margin-top:16px;font-size:0.8rem;color:var(--text-muted);">
        Demo: <code style="color:var(--green);">demo@stocknet.io</code> / <code style="color:var(--green);">demo1234</code>
      </p>
    </form>

    <!-- Register Form -->
    <form id="form-register" onsubmit="handleRegister(event)" style="display:none;">
      <div class="form-group">
        <label class="form-label" for="reg-name">Full Name</label>
        <input type="text" id="reg-name" class="form-control" placeholder="Ravi Sharma" required autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-email">Email</label>
        <input type="email" id="reg-email" class="form-control" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-password">Password</label>
        <input type="password" id="reg-password" class="form-control" placeholder="••••••••" required minlength="6" autocomplete="new-password">
      </div>

      <div id="reg-error" class="alert-banner alert-banner-warning" style="margin-bottom:16px;">
        <div class="alert-desc" id="reg-error-msg"></div>
      </div>

      <button type="submit" id="btn-register" class="btn-primary">Create Account</button>

      <p style="text-align:center;margin-top:14px;font-size:0.78rem;color:var(--text-muted);">
        New accounts start with <strong style="color:var(--green);">₹1,00,000</strong> simulated wallet balance.
      </p>
    </form>

  </div>
</div>

<div id="toast"></div>
<script src="/static/app.js?v=2"></script>
<script>
  // If already logged in, go to dashboard
  getCurrentUser().then(user => {
    if (user) window.location.href = '/dashboard';
  });

  function switchTab(tab) {
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    document.getElementById('form-login').style.display    = tab === 'login' ? '' : 'none';
    document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
  }

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-login');
    const errBox = document.getElementById('login-error');
    const errMsg = document.getElementById('login-error-msg');
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    errBox.style.display = 'none';

    try {
      await api('/auth/login', 'POST', {
        email: document.getElementById('login-email').value,
        password: document.getElementById('login-password').value,
      });
      window.location.href = '/dashboard';
    } catch (err) {
      errMsg.textContent = err.message;
      errBox.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-register');
    const errBox = document.getElementById('reg-error');
    const errMsg = document.getElementById('reg-error-msg');
    btn.disabled = true;
    btn.textContent = 'Creating account…';
    errBox.style.display = 'none';

    try {
      await api('/auth/register', 'POST', {
        name: document.getElementById('reg-name').value,
        email: document.getElementById('reg-email').value,
        password: document.getElementById('reg-password').value,
      });
      showToast('Account created! Welcome to StockNet 🎉');
      setTimeout(() => window.location.href = '/dashboard', 600);
    } catch (err) {
      errMsg.textContent = err.message;
      errBox.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  }
</script>
</body>
</html>
